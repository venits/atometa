name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (x64)
            os: windows-latest
            preset: windows-msvc
            triplet: x64-windows-static
          - name: Linux (x64)
            os: ubuntu-24.04
            preset: linux-gcc
            triplet: x64-linux
          - name: macOS (arm64)
            os: macos-14
            preset: macos-clang
            triplet: arm64-osx

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential ninja-build pkg-config libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev
      
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json
          runVcpkgInstall: true
          additionalCachedPaths: ${{ github.workspace }}/vcpkg_installed

      - name: Configure & Build
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          cmake --build build --config Release --parallel

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/atometa-${{ runner.os }}-${{ matrix.triplet }}.tar.gz -C build/bin .

      - name: Generate Hash
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum *.tar.gz > hashes.sha256
          else
            shasum -a 256 *.tar.gz > hashes.sha256
          fi
          
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.preset }}
          path: dist/*
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
