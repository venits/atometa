name: CI

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: af752f21c9d79ba3df9cb0250ce2233933f58486
  # VCPKG_ROOT is reserved by Visual Studio — use VCPKG_DIR instead
  VCPKG_DIR: ${{ github.workspace }}/vcpkg-src

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name:    Windows (x64)
            os:      windows-latest
            triplet: x64-windows-static

          - name:    Linux (x64)
            os:      ubuntu-24.04
            triplet: x64-linux

          - name:    macOS (arm64)
            os:      macos-14
            triplet: arm64-osx

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      # ── 2. System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build pkg-config curl zip unzip tar \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress

      # ── 3. MSVC environment (Windows only) ────────────────────────────────
      # Must come BEFORE vcpkg so compiler hash = cl.exe, not MinGW.
      # Also sets VCPKG_ROOT to VS's built-in vcpkg — we intentionally
      # shadow it with VCPKG_DIR to avoid the path collision.
      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 4. Cache vcpkg tool ────────────────────────────────────────────────
      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        id: vcpkg-bootstrap
        with:
          path: ${{ env.VCPKG_DIR }}
          key: vcpkg-bootstrap-${{ runner.os }}-${{ env.VCPKG_COMMIT }}

      - name: Bootstrap vcpkg
        if: steps.vcpkg-bootstrap.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ env.VCPKG_DIR }}"
          cd "${{ env.VCPKG_DIR }}"
          git checkout "$VCPKG_COMMIT"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bootstrap-vcpkg.bat -disableMetrics
          else
            ./bootstrap-vcpkg.sh -disableMetrics
          fi

      # ── 5. Cache installed packages ────────────────────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-packages
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-pkgs-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-pkgs-${{ runner.os }}-${{ matrix.triplet }}-

      # ── 6. Install dependencies ────────────────────────────────────────────
      - name: Install vcpkg dependencies
        if: steps.vcpkg-packages.outputs.cache-hit != 'true'
        shell: bash
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'macOS' && '1' || '' }}
        run: |
          "${{ env.VCPKG_DIR }}/vcpkg" install \
            --triplet=${{ matrix.triplet }} \
            --vcpkg-root="${{ env.VCPKG_DIR }}" \
            --x-install-root="${{ github.workspace }}/vcpkg_installed" \
            --x-manifest-root="${{ github.workspace }}"

      # ── 7. Configure ───────────────────────────────────────────────────────
      - name: Configure CMake
        shell: bash
        env:
          CC:  ${{ runner.os == 'Windows' && 'cl' || '' }}
          CXX: ${{ runner.os == 'Windows' && 'cl' || '' }}
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'macOS' && '1' || '' }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DATOMETA_USE_PCH=OFF \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_INSTALLED_DIR="${{ github.workspace }}/vcpkg_installed"

      # ── 8. Build ───────────────────────────────────────────────────────────
      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      # ── 9. Package ─────────────────────────────────────────────────────────
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/atometa-${{ runner.os }}-${{ matrix.triplet }}.tar.gz \
            -C build/bin .

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &>/dev/null; then
            sha256sum *.tar.gz > hashes.sha256
          else
            shasum -a 256 *.tar.gz > hashes.sha256
          fi

      # ── 10. Upload ─────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atometa-${{ runner.os }}-${{ matrix.triplet }}
          path: dist/*
          retention-days: 7

      # ── 11. Release (tags only) ────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
